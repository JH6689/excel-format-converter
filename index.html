<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 格式轉換工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Microsoft JhengHei', 'Segoe UI', Arial, sans-serif;
        }
        body {
            margin: 0;
            padding: 10px;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #334155;
            margin: 0 0 12px 0;
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 8px;
        }
        label {
            display: block;
            margin-bottom: 3px;
            font-weight: bold;
            color: #475569;
            font-size: 12px;
        }
        input[type="text"],
        input[type="number"],
        input[type="file"] {
            width: 100%;
            padding: 6px 8px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 12px;
            transition: border-color 0.3s;
            background: white;
        }
        input:focus {
            outline: none;
            border-color: #0ea5e9;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row .form-group {
            flex: 1;
        }

        /* 主要三欄佈局 */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 12px;
        }

        .panel {
            background: white;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #e2e8f0;
        }

        .section-title {
            background: #475569;
            padding: 6px 10px;
            border-radius: 6px;
            margin: 0 0 8px 0;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        /* 門市 Tab 按鈕 */
        .store-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .store-tab {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #0ea5e9;
            border-radius: 6px;
            background: white;
            color: #475569;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .store-tab:hover {
            background: #f0f9ff;
        }
        .store-tab.active {
            background: #0ea5e9;
            color: white;
            border-color: transparent;
        }

        .store-actions {
            display: flex;
            gap: 6px;
        }
        .btn-save, .btn-reset {
            flex: 1;
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-save {
            background: #e0f2fe;
            color: #0369a1;
        }
        .btn-save:hover {
            background: #bae6fd;
        }
        .btn-reset {
            background: #e0f2fe;
            color: #0369a1;
        }
        .btn-reset:hover {
            background: #bae6fd;
        }

        .save-notice {
            background: #d4edda;
            color: #155724;
            padding: 5px 8px;
            border-radius: 6px;
            margin-top: 6px;
            font-size: 11px;
            display: none;
            text-align: center;
        }
        .save-notice.show {
            display: block;
            animation: fadeInOut 2s ease-in-out;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 班別設定 2x2 網格 */
        .shift-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .shift-config {
            background: #f1f5f9;
            border-radius: 6px;
            padding: 8px;
        }
        .shift-config-title {
            font-weight: bold;
            color: #334155;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .shift-config .row {
            gap: 4px;
        }
        .shift-config input {
            padding: 4px 6px;
            font-size: 11px;
        }
        .shift-config label {
            font-size: 10px;
            margin-bottom: 2px;
            color: #475569;
        }
        .shift-config .form-group {
            margin-bottom: 0;
        }

        .hint {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }

        /* 按鈕區 */
        .btn-primary {
            padding: 10px 16px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-download {
            padding: 10px 16px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            display: none;
            margin-top: 8px;
        }
        .btn-download:hover {
            transform: translateY(-1px);
        }
        .btn-download.show {
            display: block;
        }

        .action-buttons {
            margin-top: 8px;
        }

        #status {
            margin-top: 8px;
            padding: 8px;
            border-radius: 6px;
            display: none;
            font-size: 12px;
        }
        #status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        #status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        #status.loading {
            background: #fff3cd;
            color: #856404;
            display: block;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }
        .preview-table th, .preview-table td {
            border: 1px solid #e2e8f0;
            padding: 4px 6px;
            text-align: left;
        }
        .preview-table th {
            background: #475569;
            color: white;
        }
        .preview-wrapper {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }
        .preview-wrapper .preview-table {
            margin-top: 0;
        }
        #previewSection {
            display: none;
            margin-top: 8px;
        }
        #previewSection h3 {
            font-size: 11px;
            margin: 0 0 6px 0;
            color: #475569;
        }

        /* URL 輸入框較小 */
        .url-input {
            font-size: 10px;
            padding: 5px 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Excel 格式轉換工具</h1>

        <form id="convertForm">
            <div class="main-layout">
                <!-- 左側：門市選擇 + 年月 + 檔案 -->
                <div class="panel">
                    <div class="section-title">1. 選擇門市</div>
                    <div class="store-tabs">
                        <div class="store-tab active" data-store="A" onclick="selectStore('A')">A 門市</div>
                        <div class="store-tab" data-store="B" onclick="selectStore('B')">B 門市</div>
                        <div class="store-tab" data-store="C" onclick="selectStore('C')">C 門市</div>
                    </div>
                    <div id="saveNotice" class="save-notice"></div>

                    <div class="section-title" style="margin-top: 10px;">2. 轉換年月</div>
                    <div class="form-group">
                        <input type="text" id="yearMonth" placeholder="202510" maxlength="6">
                        <div class="hint">預設下個月</div>
                    </div>

                    <div class="section-title" style="margin-top: 10px;">3. 上傳檔案</div>
                    <div class="form-group">
                        <input type="file" id="excelFile" accept=".xlsx,.xls" required>
                        <div class="hint">支援：總控、一線、出納、外帶、任務分配</div>
                    </div>
                </div>

                <!-- 中間：班別切分設定 -->
                <div class="panel">
                    <div class="section-title">4. 班別切分設定</div>
                    <div class="hint" style="margin-bottom: 6px;">留空=不切分 | 早班≤切點 | 晚班≥切點</div>
                    <div class="shift-grid">
                        <!-- 總控 -->
                        <div class="shift-config">
                            <div class="shift-config-title">總控</div>
                            <div class="row">
                                <div class="form-group">
                                    <label>早班</label>
                                    <input type="number" id="cut_總控_early" value="1050" min="0" max="2359" placeholder="留空">
                                </div>
                                <div class="form-group">
                                    <label>中下</label>
                                    <input type="number" id="cut_總控_midLate" min="0" max="2359" placeholder="留空">
                                </div>
                                <div class="form-group">
                                    <label>晚班</label>
                                    <input type="number" id="cut_總控_late" value="1150" min="0" max="2359" placeholder="留空">
                                </div>
                            </div>
                        </div>

                        <!-- 一線 -->
                        <div class="shift-config">
                            <div class="shift-config-title">一線</div>
                            <div class="row">
                                <div class="form-group">
                                    <label>早班</label>
                                    <input type="number" id="cut_一線_early" value="1020" min="0" max="2359" placeholder="留空">
                                </div>
                                <div class="form-group">
                                    <label>中下</label>
                                    <input type="number" id="cut_一線_midLate" value="1150" min="0" max="2359" placeholder="留空">
                                </div>
                                <div class="form-group">
                                    <label>晚班</label>
                                    <input type="number" id="cut_一線_late" value="1200" min="0" max="2359" placeholder="留空">
                                </div>
                            </div>
                        </div>

                        <!-- 出納 -->
                        <div class="shift-config">
                            <div class="shift-config-title">出納</div>
                            <div class="row">
                                <div class="form-group">
                                    <label>早班</label>
                                    <input type="number" id="cut_出納_early" value="1050" min="0" max="2359" placeholder="留空">
                                </div>
                                <div class="form-group">
                                    <label>中下</label>
                                    <input type="number" id="cut_出納_midLate" value="1150" min="0" max="2359" placeholder="留空">
                                </div>
                                <div class="form-group">
                                    <label>晚班</label>
                                    <input type="number" id="cut_出納_late" value="1200" min="0" max="2359" placeholder="留空">
                                </div>
                            </div>
                            <div class="form-group" style="margin-top: 4px;">
                                <label>特殊班別時間（完全符合才觸發）</label>
                                <input type="number" id="cut_出納_special" min="0" max="2359" placeholder="留空=不使用">
                            </div>
                        </div>

                        <!-- 外帶 -->
                        <div class="shift-config">
                            <div class="shift-config-title">外帶</div>
                            <div class="row">
                                <div class="form-group">
                                    <label>早班</label>
                                    <input type="number" id="cut_外帶_early" min="0" max="2359" placeholder="留空">
                                </div>
                                <div class="form-group">
                                    <label>中下</label>
                                    <input type="number" id="cut_外帶_midLate" min="0" max="2359" placeholder="留空">
                                </div>
                                <div class="form-group">
                                    <label>晚班</label>
                                    <input type="number" id="cut_外帶_late" value="1120" min="0" max="2359" placeholder="留空">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div style="text-align: right; margin-top: 8px;">
                        <button type="button" class="btn-save" onclick="saveStoreSettings()">儲存預設值</button>
                    </div>
                </div>

                <!-- 右側：對照表 + 按鈕 + 預覽 -->
                <div class="panel">
                    <div class="section-title">5. 對照表網址</div>
                    <div class="form-group">
                        <label>員工工號</label>
                        <input type="text" id="employeeSheetUrl" class="url-input"
                               value="https://docs.google.com/spreadsheets/d/1ZKRX1M1GZDSdgDe5i5JSveuEaYj3ZynaYJqvrzVNwvA/edit?gid=1729770798#gid=1729770798">
                    </div>
                    <div class="form-group">
                        <label>任務代碼</label>
                        <input type="text" id="taskCodeSheetUrl" class="url-input"
                               value="https://docs.google.com/spreadsheets/d/1ZKRX1M1GZDSdgDe5i5JSveuEaYj3ZynaYJqvrzVNwvA/edit?gid=0#gid=0">
                    </div>
                    <div style="text-align: right; margin-top: 6px;">
                        <button type="button" class="btn-save" onclick="saveUrlSettings()">儲存預設值</button>
                    </div>
                    <div id="urlSaveNotice" class="save-notice"></div>

                    <div class="section-title" style="margin-top: 10px;">6. 執行轉換</div>
                    <div class="action-buttons">
                        <button type="submit" id="submitBtn" class="btn-primary">開始轉換</button>
                        <button type="button" id="downloadBtn" class="btn-download" onclick="downloadResult()">📥 下載結果</button>
                    </div>

                    <div id="status"></div>

                    <div id="previewSection">
                        <h3>預覽（前20筆）</h3>
                        <div class="preview-wrapper">
                            <table class="preview-table" id="previewTable">
                                <thead>
                                    <tr>
                                        <th>日期</th>
                                        <th>工號</th>
                                        <th>代碼</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        // 計算下個月的年月
        function getNextMonth() {
            const now = new Date();
            let year = now.getFullYear();
            let month = now.getMonth() + 2;
            if (month > 12) {
                month = 1;
                year++;
            }
            return year.toString() + month.toString().padStart(2, '0');
        }

        // 設定預設年月
        document.getElementById('yearMonth').value = getNextMonth();

        // ========== 門市設定管理 ==========

        // 預設 Google Sheets URL
        const defaultUrls = {
            employeeSheetUrl: 'https://docs.google.com/spreadsheets/d/1ZKRX1M1GZDSdgDe5i5JSveuEaYj3ZynaYJqvrzVNwvA/edit?gid=1729770798#gid=1729770798',
            taskCodeSheetUrl: 'https://docs.google.com/spreadsheets/d/1ZKRX1M1GZDSdgDe5i5JSveuEaYj3ZynaYJqvrzVNwvA/edit?gid=0#gid=0'
        };

        // 各門市的預設班別切分設定（含 Google Sheets URL）
        const storeDefaults = {
            'A': {
                '總控': { early: 1050, midLate: '', late: 1150 },
                '一線': { early: 1020, midLate: 1150, late: 1200 },
                '出納': { early: 1050, midLate: 1150, late: 1200, special: '' },
                '外帶': { early: '', midLate: '', late: 1120 },
                employeeSheetUrl: defaultUrls.employeeSheetUrl,
                taskCodeSheetUrl: defaultUrls.taskCodeSheetUrl
            },
            'B': {
                '總控': { early: 1050, midLate: '', late: 1150 },
                '一線': { early: 1020, midLate: 1150, late: 1200 },
                '出納': { early: 1050, midLate: 1150, late: 1200, special: '' },
                '外帶': { early: '', midLate: '', late: 1120 },
                employeeSheetUrl: defaultUrls.employeeSheetUrl,
                taskCodeSheetUrl: defaultUrls.taskCodeSheetUrl
            },
            'C': {
                '總控': { early: 1050, midLate: '', late: 1150 },
                '一線': { early: 1020, midLate: 1150, late: 1200 },
                '出納': { early: 1050, midLate: 1150, late: 1200, special: '' },
                '外帶': { early: '', midLate: '', late: 1120 },
                employeeSheetUrl: defaultUrls.employeeSheetUrl,
                taskCodeSheetUrl: defaultUrls.taskCodeSheetUrl
            }
        };

        // 從 localStorage 取得門市設定
        function getStoredSettings(store) {
            const key = `shiftSettings_${store}`;
            const stored = localStorage.getItem(key);
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch (e) {
                    console.error('解析儲存設定失敗:', e);
                }
            }
            return null;
        }

        // 儲存門市設定到 localStorage
        function saveSettingsToStorage(store, settings) {
            const key = `shiftSettings_${store}`;
            localStorage.setItem(key, JSON.stringify(settings));
            localStorage.setItem('lastSelectedStore', store);
        }

        // 取得目前表單上的設定值（含 Google Sheets URL）
        function getCurrentFormSettings() {
            const sheets = ['總控', '一線', '出納', '外帶'];
            const settings = {};
            for (const sheet of sheets) {
                settings[sheet] = {
                    early: document.getElementById(`cut_${sheet}_early`).value,
                    midLate: document.getElementById(`cut_${sheet}_midLate`).value,
                    late: document.getElementById(`cut_${sheet}_late`).value
                };
                if (sheet === '出納') {
                    settings[sheet].special = document.getElementById('cut_出納_special').value;
                }
            }
            // 加入 Google Sheets URL
            settings.employeeSheetUrl = document.getElementById('employeeSheetUrl').value;
            settings.taskCodeSheetUrl = document.getElementById('taskCodeSheetUrl').value;
            return settings;
        }

        // 將設定值套用到表單（含 Google Sheets URL）
        function applySettingsToForm(settings) {
            const sheets = ['總控', '一線', '出納', '外帶'];
            for (const sheet of sheets) {
                if (settings[sheet]) {
                    document.getElementById(`cut_${sheet}_early`).value = settings[sheet].early || '';
                    document.getElementById(`cut_${sheet}_midLate`).value = settings[sheet].midLate || '';
                    document.getElementById(`cut_${sheet}_late`).value = settings[sheet].late || '';
                    if (sheet === '出納') {
                        document.getElementById('cut_出納_special').value = settings[sheet].special || '';
                    }
                }
            }
            // 套用 Google Sheets URL
            if (settings.employeeSheetUrl !== undefined) {
                document.getElementById('employeeSheetUrl').value = settings.employeeSheetUrl;
            }
            if (settings.taskCodeSheetUrl !== undefined) {
                document.getElementById('taskCodeSheetUrl').value = settings.taskCodeSheetUrl;
            }
        }

        // 載入門市設定（優先使用已儲存的，否則用預設值）
        function loadStoreSettings(store) {
            const stored = getStoredSettings(store);
            if (stored) {
                applySettingsToForm(stored);
                console.log(`載入 ${store} 門市的儲存設定`);
            } else {
                applySettingsToForm(storeDefaults[store]);
                console.log(`載入 ${store} 門市的預設設定`);
            }
        }

        // 取得目前選中的門市
        function getCurrentStore() {
            const activeTab = document.querySelector('.store-tab.active');
            return activeTab ? activeTab.dataset.store : 'A';
        }

        // 門市切換事件（Tab 點擊）
        function selectStore(store) {
            // 更新 Tab 樣式
            document.querySelectorAll('.store-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.store-tab[data-store="${store}"]`).classList.add('active');

            // 載入該門市的設定
            loadStoreSettings(store);
            localStorage.setItem('lastSelectedStore', store);
        }

        // 儲存當前門市設定
        function saveStoreSettings() {
            const store = getCurrentStore();
            const settings = getCurrentFormSettings();
            saveSettingsToStorage(store, settings);

            // 顯示儲存成功提示
            const notice = document.getElementById('saveNotice');
            notice.textContent = `✓ ${store} 門市設定已儲存`;
            notice.classList.remove('show');
            void notice.offsetWidth; // 觸發 reflow 以重新播放動畫
            notice.classList.add('show');

            setTimeout(() => {
                notice.classList.remove('show');
            }, 2000);
        }

        // 儲存對照表網址（套用至目前門市）
        function saveUrlSettings() {
            const store = getCurrentStore();
            const settings = getCurrentFormSettings();
            saveSettingsToStorage(store, settings);

            const notice = document.getElementById('urlSaveNotice');
            notice.textContent = `✓ ${store} 門市網址已儲存`;
            notice.classList.remove('show');
            void notice.offsetWidth;
            notice.classList.add('show');

            setTimeout(() => {
                notice.classList.remove('show');
            }, 2000);
        }

        // 恢復預設值
        function resetToDefault() {
            const store = getCurrentStore();
            applySettingsToForm(storeDefaults[store]);

            const notice = document.getElementById('saveNotice');
            notice.textContent = `↩ 已恢復 ${store} 門市預設值`;
            notice.classList.remove('show');
            void notice.offsetWidth;
            notice.classList.add('show');

            setTimeout(() => {
                notice.classList.remove('show');
            }, 2000);
        }

        // 頁面載入時初始化門市設定
        function initStoreSettings() {
            const lastStore = localStorage.getItem('lastSelectedStore') || 'A';
            // 設定 active tab
            document.querySelectorAll('.store-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            const targetTab = document.querySelector(`.store-tab[data-store="${lastStore}"]`);
            if (targetTab) {
                targetTab.classList.add('active');
            }
            loadStoreSettings(lastStore);
        }

        // 執行初始化
        initStoreSettings();

        // ========== 班別切分設定 ==========

        // 取得各職務的切分點設定
        function getShiftCutoffs() {
            const sheets = ['總控', '一線', '出納', '外帶'];
            const cutoffs = {};

            for (const sheet of sheets) {
                const earlyVal = document.getElementById(`cut_${sheet}_early`).value;
                const midLateVal = document.getElementById(`cut_${sheet}_midLate`).value;
                const lateVal = document.getElementById(`cut_${sheet}_late`).value;

                cutoffs[sheet] = {
                    early: earlyVal ? parseInt(earlyVal) : null,
                    midLate: midLateVal ? parseInt(midLateVal) : null,
                    late: lateVal ? parseInt(lateVal) : null
                };

                if (sheet === '出納') {
                    const specialVal = document.getElementById('cut_出納_special').value;
                    cutoffs[sheet].special = specialVal ? parseInt(specialVal) : null;
                }
            }

            return cutoffs;
        }

        // 從 Google Sheets URL 提取資訊並取得 CSV URL
        function getGoogleSheetCsvUrl(url) {
            if (!url) return null;
            const spreadsheetIdMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            const gidMatch = url.match(/gid=(\d+)/);
            if (!spreadsheetIdMatch) return null;
            const gid = gidMatch ? gidMatch[1] : '0';
            return `https://docs.google.com/spreadsheets/d/${spreadsheetIdMatch[1]}/export?format=csv&gid=${gid}`;
        }

        // 解析 CSV（支援儲存格內含換行的格式）
        function parseCsv(csvText) {
            const result = [];
            let row = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];

                if (char === '"') {
                    // 處理 "" 跳脫字元
                    if (inQuotes && csvText[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    row.push(current.trim());
                    current = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    // 引號外的換行 = 新的一行
                    if (char === '\r' && csvText[i + 1] === '\n') i++; // 跳過 \r\n 的 \n
                    row.push(current.trim());
                    current = '';
                    if (row.some(cell => cell !== '')) result.push(row);
                    row = [];
                } else {
                    // 引號內的換行視為儲存格內容，直接移除（正規化）
                    if ((char === '\n' || char === '\r') && inQuotes) continue;
                    current += char;
                }
            }

            // 最後一行
            row.push(current.trim());
            if (row.some(cell => cell !== '')) result.push(row);

            return result;
        }

        // 載入 Google Sheets 資料
        async function fetchGoogleSheet(url) {
            const csvUrl = getGoogleSheetCsvUrl(url);
            if (!csvUrl) return null;

            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error('無法載入');
                const text = await response.text();
                return parseCsv(text);
            } catch (error) {
                console.error('載入 Google Sheet 失敗:', error);
                return null;
            }
        }

        // 正規化姓名：移除所有換行字元與前後空白
        function normalizeName(name) {
            return String(name).replace(/[\r\n]/g, '').trim();
        }

        // 載入員工對照表
        async function loadEmployeeMapping(url) {
            const rows = await fetchGoogleSheet(url);
            if (!rows) return {};

            const mapping = {};
            for (let i = 1; i < rows.length; i++) {
                if (rows[i][0] && rows[i][1]) {
                    mapping[normalizeName(rows[i][0])] = rows[i][1].trim();
                }
            }
            return mapping;
        }

        // 載入任務代碼對照表（支援多個表單類型，包含中下班）
        async function loadAllTaskCodeMappings(url) {
            const rows = await fetchGoogleSheet(url);

            // 定義要處理的表單類型及其在雲端對照表的搜尋關鍵字
            // 現在支援四種班別：早、中、中下、晚（出納額外支援特殊班別）
            const sheetTypes = {
                '總控': { searchKey: '總控', early: null, middle: null, midLate: null, late: null },
                '一線': { searchKey: '一線', early: null, middle: null, midLate: null, late: null },
                '出納': { searchKey: '出納', early: null, middle: null, midLate: null, late: null, special: null },
                '外帶': { searchKey: '外', early: null, middle: null, midLate: null, late: null }
            };

            if (!rows) {
                console.error('無法載入任務代碼對照表');
                return {
                    '總控': { early: null, middle: null, midLate: null, late: null },
                    '一線': { early: null, middle: null, midLate: null, late: null },
                    '出納': { early: null, middle: null, midLate: null, late: null, special: null },
                    '外帶': { early: null, middle: null, midLate: null, late: null }
                };
            }

            console.log('Google Sheets 對照表內容:', rows);

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const firstCol = (row[0] || '').trim();
                const taskCode = (row[1] || row[0] || '').trim();

                // 檢查每種表單類型
                for (const [sheetName, config] of Object.entries(sheetTypes)) {
                    const searchKey = config.searchKey;

                    // 特殊處理「外帶」：搜尋「外早」「外中」「外中下」「外下」「外晚」
                    if (sheetName === '外帶') {
                        const isExternalOnly = firstCol.includes('外') && !firstCol.includes('總控') && !firstCol.includes('一線') && !firstCol.includes('出納');
                        if (!isExternalOnly) continue;

                        if (firstCol.includes('外早') || (firstCol.includes('早'))) {
                            config.early = taskCode;
                        } else if (firstCol.includes('外中下') || firstCol.includes('外下') || (firstCol.includes('中下') || firstCol.includes('下'))) {
                            config.midLate = taskCode;
                        } else if (firstCol.includes('外中') || firstCol.includes('中')) {
                            config.middle = taskCode;
                        } else if (firstCol.includes('外晚') || firstCol.includes('晚')) {
                            config.late = taskCode;
                        }
                    } else {
                        // 其他表單類型：搜尋「XX早」「XX中」「XX中下」「XX下」「XX晚」
                        if (firstCol.includes(searchKey)) {
                            if (firstCol.includes('早')) {
                                config.early = taskCode;
                            } else if (firstCol.includes('中下') || (firstCol.includes('下') && !firstCol.includes('晚'))) {
                                config.midLate = taskCode;
                            } else if (firstCol.includes('中')) {
                                config.middle = taskCode;
                            } else if (firstCol.includes('晚')) {
                                config.late = taskCode;
                            } else if (sheetName === '出納') {
                                // 出納：不含早/中/中下/晚 → 特殊班別代號
                                config.special = taskCode;
                            }
                        }
                    }
                }
            }

            // 轉換為結果格式（找不到代碼則為 null，之後會略過）
            const result = {};
            for (const [sheetName, config] of Object.entries(sheetTypes)) {
                result[sheetName] = {
                    early: config.early || null,
                    middle: config.middle || null,
                    midLate: config.midLate || null,
                    late: config.late || null,
                    special: config.special || null
                };
            }

            console.log('All task code mappings:', result);
            return result;
        }

        // 載入任務分配對照表（任務名稱 → 任務代碼）
        // 使用與班別相同的對照表，排除班別相關項目
        function loadTaskAssignMapping(rows) {
            if (!rows) {
                console.log('無法載入任務分配對照表');
                return {};
            }

            const mapping = {};
            // 第一欄是任務名稱，第二欄是代碼
            // 排除班別相關的項目
            const shiftPatterns = ['總控早', '總控中', '總控晚', '總控下',
                                   '一線早', '一線中', '一線晚', '一線下',
                                   '出納早', '出納中', '出納晚', '出納下',
                                   '外早', '外中', '外晚', '外下'];

            for (let i = 0; i < rows.length; i++) {
                const taskName = (rows[i][0] || '').trim();
                const taskCode = (rows[i][1] || '').trim();

                // 跳過班別相關項目
                const isShiftItem = shiftPatterns.some(pattern => taskName.includes(pattern));
                if (isShiftItem) {
                    continue;
                }

                if (taskName && taskCode) {
                    mapping[taskName] = taskCode;
                }
            }

            console.log('Task assign mapping loaded:', mapping);
            return mapping;
        }

        // 檢查是否為有效的班別時間
        function isValidShiftTime(value) {
            if (value === null || value === undefined) return false;
            const str = String(value).trim();
            return /^\d{3,4}$/.test(str);
        }

        // 判斷班別（支援各職務獨立切分點）
        // cutoffs: { early: number|null, midLate: number|null, late: number|null }
        // 返回: 'early', 'middle', 'midLate', 'late'
        function getShiftType(timeValue, cutoffs) {
            const time = parseInt(timeValue, 10);
            if (isNaN(time)) return null;

            const { early, midLate, late } = cutoffs;

            // 情況1: 只有晚班切點（如外帶預設）
            // 晚班切點後(含)為晚班，其他為早班
            if (early === null && midLate === null && late !== null) {
                return time >= late ? 'late' : 'early';
            }

            // 情況2: 只有早班和晚班切點（如總控預設）
            // 早班切點前(含)為早班，晚班切點後(含)為晚班，其他為中班
            if (early !== null && midLate === null && late !== null) {
                if (time <= early) return 'early';
                if (time >= late) return 'late';
                return 'middle';
            }

            // 情況3: 有早班、中下、晚班切點（如一線、出納預設）
            // 早班切點前(含)為早班
            // 中下切點到晚班切點之間(含中下，不含晚班)為中下班
            // 晚班切點後(含)為晚班
            // 其餘為中班
            if (early !== null && midLate !== null && late !== null) {
                if (time <= early) return 'early';
                if (time >= late) return 'late';
                if (time >= midLate && time < late) return 'midLate';
                return 'middle';
            }

            // 其他情況：預設返回中班
            return 'middle';
        }

        // 取得某月天數
        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        // 格式化日期
        function formatDate(year, month, day) {
            return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        let convertedData = null;

        // 表單提交
        document.getElementById('convertForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const fileInput = document.getElementById('excelFile');
            const yearMonth = document.getElementById('yearMonth').value || getNextMonth();
            const employeeSheetUrl = document.getElementById('employeeSheetUrl').value;
            const taskCodeSheetUrl = document.getElementById('taskCodeSheetUrl').value;

            // 取得各職務的切分點設定
            const shiftCutoffs = getShiftCutoffs();
            console.log('Shift cutoffs:', shiftCutoffs);

            if (!fileInput.files[0]) {
                showStatus('請選擇檔案', 'error');
                return;
            }

            showStatus('轉換中，請稍候...', 'loading');
            document.getElementById('submitBtn').disabled = true;

            try {
                // 解析年月
                let year, month;
                if (yearMonth.length === 6) {
                    year = parseInt(yearMonth.substring(0, 4), 10);
                    month = parseInt(yearMonth.substring(4, 6), 10);
                } else {
                    const now = new Date();
                    year = now.getFullYear();
                    month = now.getMonth() + 2;
                    if (month > 12) { month = 1; year++; }
                }

                const daysInMonth = getDaysInMonth(year, month);

                // 讀取 Excel 檔案
                const fileData = await fileInput.files[0].arrayBuffer();
                const workbook = XLSX.read(fileData, { type: 'array' });

                // 定義要處理的表單（班別表單）
                const sheetsToProcess = ['總控', '一線', '出納', '外帶'];
                const foundSheets = sheetsToProcess.filter(name => workbook.SheetNames.includes(name));

                // 檢查是否有任務分配表單
                const hasTaskAssignSheet = workbook.SheetNames.includes('任務分配');

                if (foundSheets.length === 0 && !hasTaskAssignSheet) {
                    showStatus('找不到可處理的表單（總控、一線、出納、外帶、任務分配）', 'error');
                    return;
                }

                // 載入對照表
                const [employeeMapping, taskCodeRows] = await Promise.all([
                    loadEmployeeMapping(employeeSheetUrl),
                    fetchGoogleSheet(taskCodeSheetUrl)
                ]);

                // 從對照表解析班別代碼和任務分配代碼
                const allTaskCodes = await loadAllTaskCodeMappings(taskCodeSheetUrl);
                const taskAssignMapping = loadTaskAssignMapping(taskCodeRows);

                console.log('Employee mapping:', employeeMapping);
                console.log('All task codes:', allTaskCodes);
                console.log('Task assign mapping:', taskAssignMapping);

                const result = [];

                // 處理每個表單
                for (const sheetName of foundSheets) {
                    const sheet = workbook.Sheets[sheetName];
                    const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                    const taskCodes = allTaskCodes[sheetName];
                    const cutoffs = shiftCutoffs[sheetName];

                    console.log(`Processing sheet: ${sheetName}, taskCodes:`, taskCodes, 'cutoffs:', cutoffs);

                    // 從第二行開始（第一行是標題）
                    for (let rowIndex = 1; rowIndex < data.length; rowIndex++) {
                        const row = data[rowIndex];
                        const employeeName = normalizeName(row[0] || '');
                        if (!employeeName) continue;

                        const employeeId = employeeMapping[employeeName] || employeeName;

                        for (let colIndex = 1; colIndex <= daysInMonth && colIndex < row.length; colIndex++) {
                            const cellValue = row[colIndex];
                            const cellStr = String(cellValue).trim();

                            if (isValidShiftTime(cellStr)) {
                                const day = colIndex;
                                const date = formatDate(year, month, day);

                                let taskCode;
                                // 先判斷特殊班別（完全符合時間才觸發，僅出納有此設定）
                                if (cutoffs.special !== null && parseInt(cellStr) === cutoffs.special) {
                                    taskCode = taskCodes.special;
                                } else {
                                    const shiftType = getShiftType(cellStr, cutoffs);
                                    if (shiftType === 'early') {
                                        taskCode = taskCodes.early;
                                    } else if (shiftType === 'middle') {
                                        taskCode = taskCodes.middle;
                                    } else if (shiftType === 'midLate') {
                                        taskCode = taskCodes.midLate;
                                    } else if (shiftType === 'late') {
                                        taskCode = taskCodes.late;
                                    }
                                }

                                // 如果找不到對應代碼，略過不轉換
                                if (taskCode) {
                                    result.push({
                                        date: date,
                                        employeeId: employeeId,
                                        taskCode: taskCode
                                    });
                                }
                            }
                        }
                    }
                }

                // 處理任務分配表單
                let processedTaskAssign = false;
                if (hasTaskAssignSheet && taskAssignMapping && Object.keys(taskAssignMapping).length > 0) {
                    const sheet = workbook.Sheets['任務分配'];
                    const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

                    console.log('Processing sheet: 任務分配');
                    console.log('  data rows:', data.length);

                    // 任務分配表單結構：
                    // 第一欄：任務名稱
                    // 第二欄以後：日期（1號到最後一號）
                    // 儲存格內容：員工姓名

                    for (let rowIndex = 1; rowIndex < data.length; rowIndex++) {
                        const row = data[rowIndex];
                        const taskName = String(row[0] || '').trim();
                        if (!taskName) continue;

                        // 查找任務代碼
                        const taskCode = taskAssignMapping[taskName];
                        if (!taskCode) {
                            console.log(`  跳過任務: ${taskName} (無對應代碼)`);
                            continue;
                        }

                        // 處理每一天
                        for (let colIndex = 1; colIndex <= daysInMonth && colIndex < row.length; colIndex++) {
                            const cellValue = row[colIndex];
                            const employeeName = normalizeName(cellValue);

                            if (employeeName) {
                                const day = colIndex;
                                const date = formatDate(year, month, day);
                                const employeeId = employeeMapping[employeeName] || employeeName;

                                result.push({
                                    date: date,
                                    employeeId: employeeId,
                                    taskCode: taskCode
                                });
                                processedTaskAssign = true;
                            }
                        }
                    }
                } else if (hasTaskAssignSheet) {
                    console.log('任務分配表單存在，但對照表中無對應的任務代碼，跳過處理');
                }

                // 統計處理的表單
                const processedSheets = [...foundSheets];
                if (processedTaskAssign) {
                    processedSheets.push('任務分配');
                }

                convertedData = result;

                if (result.length === 0) {
                    showStatus(`沒有可轉換的資料。請確認對照表是否公開且有對應代碼`, 'error');
                } else {
                    showStatus(`轉換成功！共 ${result.length} 筆（${processedSheets.join('、')}）`, 'success');
                }
                showPreview(result);

            } catch (error) {
                showStatus('發生錯誤: ' + error.message, 'error');
                console.error(error);
            } finally {
                document.getElementById('submitBtn').disabled = false;
            }
        });

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = type;
        }

        function showPreview(data) {
            const tbody = document.querySelector('#previewTable tbody');
            tbody.innerHTML = '';

            const previewData = data.slice(0, 20);
            previewData.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.date}</td>
                    <td>${row.employeeId}</td>
                    <td>${row.taskCode}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('previewSection').style.display = 'block';

            // 顯示下載按鈕
            if (data.length > 0) {
                document.getElementById('downloadBtn').classList.add('show');
            } else {
                document.getElementById('downloadBtn').classList.remove('show');
            }
        }

        function downloadResult() {
            if (!convertedData) {
                alert('沒有可下載的資料');
                return;
            }

            // 建立 Excel 工作表
            const wsData = [
                ['ScheduleDate', 'StaffID', 'BoardTaskID'],
                ...convertedData.map(row => [row.date, row.employeeId, row.taskCode])
            ];

            const ws = XLSX.utils.aoa_to_sheet(wsData);
            ws['!cols'] = [{ wch: 12 }, { wch: 15 }, { wch: 20 }];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '轉換結果');

            XLSX.writeFile(wb, '轉換結果.xlsx');
        }
    </script>
</body>
